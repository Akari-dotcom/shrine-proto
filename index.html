<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神社探索レーダーアプリ</title>
    <style>
        /* --- 基本設定 --- */
        :root {
            --border-style: 2px solid #000000;
            --radius: 12px;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 起動スプラッシュ画面 --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        .splash-content {
            position: absolute;
            opacity: 0;
            transition: opacity 1s ease;
            max-width: 80%;
            text-align: center;
        }
        .fade-in { opacity: 1; }

        /* --- ボタン・ボックス共通デザイン --- */
        .box {
            border: var(--border-style);
            border-radius: var(--radius);
            padding: 15px;
            margin: 10px;
            background-color: #ffffff;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .btn {
            border: var(--border-style);
            border-radius: var(--radius);
            padding: 12px 24px;
            background-color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 0 #000000;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #000000;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000000;
        }
        .input-field {
            border: var(--border-style);
            border-radius: var(--radius);
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 16px;
        }

        /* --- 画面切り替え用の制御 --- */
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .active-screen { display: flex; }

        /* --- メニュー（サイドバー） --- */
        #menu-trigger {
            position: fixed;
            top: 15px;
            right: 15px;
            border: var(--border-style);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 20px;
            font-weight: bold;
            background: #fff;
            cursor: pointer;
            z-index: 100;
        }
        #sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background-color: #ffffff;
            border-left: var(--border-style);
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
            z-index: 99;
        }
        #sidebar.open { right: 0; }
        .menu-item {
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- ポップアップ（共通） --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .popup {
            background: #fff;
            border: var(--border-style);
            border-radius: var(--radius);
            padding: 20px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        /* --- 特殊演出用 --- */
        .highlight-btn {
            background-color: #000000 !important;
            color: #ffffff !important;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="developer-logo" class="splash-content">
            <img src="assets/developer_logo.png" alt="ニワトリ制作所" style="width: 120px; height: auto;" onerror="this.style.display='none'">
            <h2 style="font-family: serif; margin-top: 10px;">ニワトリ制作所</h2>
        </div>
        <div id="title-logo" class="splash-content">
            <img src="assets/title_logo.png" alt="神社探索レーダー" style="width: 220px; height: auto;" onerror="this.style.display='none'">
            <h1 style="letter-spacing: 2px;">神社探索レーダー</h1>
        </div>
    </div>

    <div id="menu-trigger" onclick="toggleSidebar()">≡</div>

    <div id="sidebar">
        <h3>メニュー</h3>
        <hr style="border: 1px solid #000;">
        <div class="menu-item">
            <span>名前: <b id="menu-name">--</b></span>
            <button class="btn" style="padding:5px 10px;" onclick="openEditPopup('name')">変更</button>
        </div>
        <div class="menu-item">
            <span>身長: <b id="menu-height">--</b>cm</span>
            <button class="btn" style="padding:5px 10px;" onclick="openEditPopup('height')">変更</button>
        </div>
        <div class="menu-item">
            <span>足: <b id="menu-foot">--</b>cm</span>
            <button class="btn" style="padding:5px 10px;" onclick="openEditPopup('foot')">変更</button>
        </div>
        <div class="menu-item">
            <span>参拝率: <b id="menu-rate">0/0</b></span>
        </div>
        <div class="menu-item">
            <span>TA最高スコア: <b id="menu-ta-max">0</b></span>
        </div>
        <div class="menu-item" style="flex-direction: column; gap:10px;">
            <button class="btn" style="width:100%;" onclick="switchMode()">モード切替</button>
            <button class="btn" style="width:100%; color:red;" onclick="triggerReset()">リセット</button>
            <button class="btn" style="width:100%;" onclick="alert('制作者情報:\nニワトリ制作所\n福井県の全神社巡りを応援しています！')">制作者情報</button>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <h2 style="margin-top: 40px;">初期設定</h2>
        <div class="box">
            <label>ユーザーネーム</label>
            <input type="text" id="setup-name" class="input-field" placeholder="ニワトリ">
            <label>身長 (cm)</label>
            <input type="number" id="setup-height" class="input-field" placeholder="170">
            <label>足のサイズ (cm)</label>
            <input type="number" id="setup-foot" class="input-field" placeholder="26">
            <button class="btn" style="width: 100%; margin-top:10px;" onclick="startApp()">参拝を開始</button>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <h2 style="margin-top: 40px;">通常探索モード</h2>
        <div class="box" style="font-size:11px; background:#f9f9f9; text-align: center;">
            現在位置 ➔ 緯度: <span id="gps-lat">取得中...</span> | 経度: <span id="gps-lng">取得中...</span>
        </div>
        
        <div id="shrine-list" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <p style="margin-top:20px;">データベースを読み込んでいます...</p>
        </div>
    </div>

    <div id="screen-ta" class="screen">
        <h2 style="margin-top: 40px;">タイムアタック</h2>
        <div class="box" style="text-align:center;">
            <div id="ta-timer" style="font-size: 32px; font-weight:bold; margin-bottom:10px;">00:00.00</div>
            <button class="btn" id="ta-lottery-btn" style="margin-right:10px;" onclick="drawTaLottery()">抽選する</button>
            <button class="btn" id="ta-start-btn" onclick="startTaTimer()" disabled>スタート</button>
        </div>
        <div class="box" id="ta-target" style="display:none; text-align: center;">
            <h3>🎯 ターゲット神社</h3>
            <h4 id="ta-shrine-name">--</h4>
            <p>方角: <span id="ta-shrine-bearing">--</span>° | 距離: <span id="ta-shrine-distance">--</span>m</p>
            <div id="ta-speed-alert" style="color: red; font-weight: bold; margin-top: 10px; display: none;">【警告】速度超過を検知！</div>
        </div>
    </div>

    <div id="edit-overlay" class="overlay">
        <div class="popup">
            <h3 id="popup-title">設定変更</h3>
            <input type="text" id="popup-input" class="input-field">
            <button class="btn" onclick="closeEditPopup(true)">保存</button>
            <button class="btn" style="box-shadow:none; transform:none;" onclick="closeEditPopup(false)">キャンセル</button>
        </div>
    </div>

    <div id="anime-overlay" class="overlay" onclick="this.style.display='none'">
        <div style="color:#fff; font-size:32px; font-weight:bold; text-align:center; animation: pulse 1s infinite;">
            ⛩️ 参拝完了 ⛩️<br>
            <span style="font-size:16px; font-weight: normal; color: #ccc;">(画面タップで閉じる)</span>
        </div>
    </div>

    <script>
        // --- 状態管理オブジェクト ---
        let ALL_SHRINES_DB = []; // 💡外部JSONから取得した全神社データがここに入る
        let userData = { name: "", height: 170, foot: 26, currentMode: "normal" };
        let visitedShrines = new Set(); // 参拝済み神社の一意なキー（"北緯_東経" の文字列）
        let currentWatchId = null;
        const EARTH_RADIUS = 6378137;

        // タイムアタック用変数
        let taTargetShrine = null;
        let taStartTime = null;
        let taTimerInterval = null;
        let taIsRunning = false;

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // --- 1. 【新規】同階層の外部JSONファイルを読み込む関数 ---
        async function fetchShrineDatabase() {
            try {
                // 同じGitHubレポジトリ内の「shrines.json」を相対パスで取得
                const response = await fetch("./shrines.json");
                if (!response.ok) throw new Error("ネットワーク応答が正常ではありません。");
                
                ALL_SHRINES_DB = await response.json();
                console.log(`データベース同期成功: ${ALL_SHRINES_DB.length} 件の神社をロードしました。`);
                return true;
            } catch (error) {
                console.error("データベースの取得に失敗しました:", error);
                const listArea = document.getElementById("shrine-list");
                if (listArea) {
                    listArea.innerHTML = `<p style="color:red; padding:20px;">【エラー】shrines.json がメインファイルと同じ場所に存在しないか、読み込めません。</p>`;
                }
                return false;
            }
        }

        // --- 起動シークエンス ---
        window.addEventListener("DOMContentLoaded", async () => {
            // ロゴアニメーション
            const devLogo = document.getElementById("developer-logo");
            const titleLogo = document.getElementById("title-logo");
            const splash = document.getElementById("splash-screen");

            devLogo.classList.add("fade-in");
            await sleep(1800);
            devLogo.classList.remove("fade-in");
            await sleep(600);

            titleLogo.classList.add("fade-in");
            await sleep(1800);
            titleLogo.classList.remove("fade-in");
            await sleep(600);

            splash.style.opacity = "0";
            await sleep(600);
            splash.style.display = "none";

            // 💡データベースファイルの非同期読み込みを実行
            const dbLoaded = await fetchShrineDatabase();
            if (!dbLoaded) return; // 読み込めなければここでストップ

            // 2. 2回目以降の判定
            if (localStorage.getItem("shrine_app_configured") === "true") {
                userData.name = localStorage.getItem("user_name");
                userData.height = Number(localStorage.getItem("user_height")) || 170;
                userData.foot = Number(localStorage.getItem("user_foot")) || 26;
                
                // 参拝履歴の復元
                const savedHistory = localStorage.getItem("visited_shrines_history_v2");
                if (savedHistory) visitedShrines = new Set(JSON.parse(savedHistory));

                updateMenuDisplay();
                document.getElementById("screen-main").classList.add("active-screen");
                startGpsTracking();
            } else {
                updateMenuDisplay();
                document.getElementById("screen-setup").classList.add("active-screen");
            }
        });

        // --- 初期登録・UI制御 ---
        function startApp() {
            userData.name = document.getElementById("setup-name").value || "ニワトリ";
            userData.height = Number(document.getElementById("setup-height").value) || 170;
            userData.foot = Number(document.getElementById("setup-foot").value) || 26;

            localStorage.setItem("shrine_app_configured", "true");
            localStorage.setItem("user_name", userData.name);
            localStorage.setItem("user_height", userData.height);
            localStorage.setItem("user_foot", userData.foot);

            updateMenuDisplay();
            document.getElementById("screen-setup").classList.remove("active-screen");
            document.getElementById("screen-main").classList.add("active-screen");
            startGpsTracking();
        }

        function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); }

        function updateMenuDisplay() {
            document.getElementById("menu-name").innerText = userData.name;
            document.getElementById("menu-height").innerText = userData.height;
            document.getElementById("menu-foot").innerText = userData.foot;
            document.getElementById("menu-ta-max").innerText = localStorage.getItem("ta_best_score") || "0";
            updateVisitedRateDisplay();
        }

        function updateVisitedRateDisplay() {
            const total = ALL_SHRINES_DB ? ALL_SHRINES_DB.length : 0;
            document.getElementById("menu-rate").innerText = `${visitedShrines.size}/${total}`;
        }

        function switchMode() {
            toggleSidebar();
            if (userData.currentMode === "normal") {
                userData.currentMode = "ta";
                document.getElementById("screen-main").classList.remove("active-screen");
                document.getElementById("screen-ta").classList.add("active-screen");
                resetTaUi();
            } else {
                userData.currentMode = "normal";
                document.getElementById("screen-ta").classList.remove("active-screen");
                document.getElementById("screen-main").classList.add("active-screen");
                stopTaTimer();
            }
        }

        // --- 位置計算ロジック（ハバーシン＆方位） ---
        function getDistance(lat1, lng1, lat2, lng2) {
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            return EARTH_RADIUS * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function getBearing(lat1, lng1, lat2, lng2) {
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const lam1 = lng1 * Math.PI / 180;
            const lam2 = lng2 * Math.PI / 180;
            const y = Math.sin(lam2 - lam1) * Math.cos(phi2);
            const x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(lam2 - lam1);
            return Math.round((Math.atan2(y, x) * 180 / Math.PI + 360) % 360);
        }

        // --- GPS リアルタイム追従 ---
        function startGpsTracking() {
            if (!navigator.geolocation) {
                alert("このブラウザは位置情報に対応していません。");
                return;
            }
            currentWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    document.getElementById("gps-lat").innerText = lat.toFixed(5);
                    document.getElementById("gps-lng").innerText = lng.toFixed(5);

                    // 不正速度チェック
                    if (position.coords.speed !== null) {
                        const speedKmh = position.coords.speed * 3.6;
                        const avgWalkSpeed = calculateAvgWalkingSpeed();
                        if (speedKmh > (avgWalkSpeed + 15)) {
                            handleCheatingDetected();
                            return;
                        }
                    }

                    // モードに応じて処理を分岐
                    if (userData.currentMode === "normal") {
                        executeSearchLogic(lat, lng);
                    } else if (userData.currentMode === "ta" && taIsRunning) {
                        executeTaTracking(lat, lng);
                    }
                },
                (err) => { console.error("GPSエラー:", err); },
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }

        // --- ループ検索アルゴリズム ---
        function executeSearchLogic(userLat, userLng) {
            let radius = 1500; // 1.5km
            const maxRadius = 10000; // 10km
            let hits = [];

            while (radius <= maxRadius) {
                hits = ALL_SHRINES_DB.filter(shrine => {
                    // 💡固有IDがなくても、緯度と経度を繋げた文字列（例: "35.55366_135.48005"）を一意の識別キーとして利用
                    const uniqueKey = `${shrine.北緯}_${shrine.東経}`;
                    if (visitedShrines.has(uniqueKey)) return false;

                    const d = getDistance(userLat, userLng, shrine.北緯, shrine.東経);
                    shrine.tempDist = d;
                    shrine.tempBear = getBearing(userLat, userLng, shrine.北緯, shrine.東経);
                    return d <= radius;
                });

                if (hits.length > 0) break;
                radius += 500; 
            }

            const listArea = document.getElementById("shrine-list");
            listArea.innerHTML = "";

            if (hits.length > 0) {
                hits.sort((a, b) => a.tempDist - b.tempDist);
                hits.forEach(shrine => {
                    const isWithin50m = shrine.tempDist <= 50;
                    const btnClass = isWithin50m ? "btn highlight-btn" : "btn";
                    const btnText = isWithin50m ? "参拝する (範囲内！)" : "参拝する";
                    const uniqueKey = `${shrine.北緯}_${shrine.東経}`;

                    const card = document.createElement("div");
                    card.className = "box";
                    card.innerHTML = `
                        <h3 style="margin:0 0 5px 0;">${shrine.名称}</h3>
                        <p style="margin:0 0 10px 0; font-size:14px; color:#555;">
                            方角: ${shrine.tempBear}° 方向 | 直線距離: ${Math.round(shrine.tempDist)}m
                        </p>
                        <button class="${btnClass}" onclick="tapVisitShrine('${uniqueKey}', ${isWithin50m})">${btnText}</button>
                    `;
                    listArea.appendChild(card);
                });
            } else {
                listArea.innerHTML = `
                    <div class="box" style="text-align:center; border-style: dashed;">
                        <p style="font-weight:bold;">周辺の神社はすべて参拝しました</p>
                        <p style="font-size:12px; color:#666;">移動して新しい神社が範囲内に入るのを待っています...</p>
                    </div>
                `;
            }
        }

        function tapVisitShrine(uniqueKey, isWithin50m) {
            if (!isWithin50m) {
                alert("神社から50m圏内に入ると参拝が可能になります。もっと近づいてみましょう！");
                return;
            }
            visitedShrines.add(uniqueKey);
            localStorage.setItem("visited_shrines_history_v2", JSON.stringify(Array.from(visitedShrines)));
            updateVisitedRateDisplay();
            document.getElementById("anime-overlay").style.display = "flex";
            
            navigator.geolocation.getCurrentPosition((pos) => {
                executeSearchLogic(pos.coords.latitude, pos.coords.longitude);
            });
        }

        // --- タイムアタックモード制御 ---
        function resetTaUi() {
            document.getElementById("ta-timer").innerText = "00:00.00";
            document.getElementById("ta-target").style.display = "none";
            document.getElementById("ta-lottery-btn").disabled = false;
            document.getElementById("ta-start-btn").disabled = true;
            taTargetShrine = null;
            taIsRunning = false;
        }

        function drawTaLottery() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const uLat = pos.coords.latitude;
                const uLng = pos.coords.longitude;

                const candidates = ALL_SHRINES_DB.filter(shrine => {
                    return getDistance(uLat, uLng, shrine.北緯, shrine.東経) <= 20000; // 半径20km圏内
                });

                if (candidates.length === 0) {
                    alert("半径20km圏内に神社が見つかりませんでした。別の場所で試してください。");
                    return;
                }

                taTargetShrine = candidates[Math.floor(Math.random() * candidates.length)];
                
                const dist = getDistance(uLat, uLng, taTargetShrine.北緯, taTargetShrine.東経);
                const bear = getBearing(uLat, uLng, taTargetShrine.北緯, taTargetShrine.東経);

                document.getElementById("ta-shrine-name").innerText = taTargetShrine.名称;
                document.getElementById("ta-shrine-bearing").innerText = bear;
                document.getElementById("ta-shrine-distance").innerText = Math.round(dist);
                
                document.getElementById("ta-target").style.display = "block";
                document.getElementById("ta-start-btn").disabled = false;
            });
        }

        function startTaTimer() {
            taIsRunning = true;
            taStartTime = performance.now();
            document.getElementById("ta-start-btn").disabled = true;
            document.getElementById("ta-lottery-btn").disabled = true;

            taTimerInterval = setInterval(() => {
                const elapsed = performance.now() - taStartTime;
                const min = Math.floor(elapsed / 60000).toString().padStart(2, '0');
                const sec = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                const ms = Math.floor((elapsed % 1000) / 10).toString().padStart(2, '0');
                document.getElementById("ta-timer").innerText = `${min}:${sec}.${ms}`;
            }, 10);
        }

        function executeTaTracking(userLat, userLng) {
            const dist = getDistance(userLat, userLng, taTargetShrine.北緯, taTargetShrine.東経);
            const bear = getBearing(userLat, userLng, taTargetShrine.北緯, taTargetShrine.東経);

            document.getElementById("ta-shrine-bearing").innerText = bear;
            document.getElementById("ta-shrine-distance").innerText = Math.round(dist);

            if (dist <= 50) { // 50m圏内突入
                stopTaTimer();
                const totalTimeMs = performance.now() - taStartTime;
                calculateTaScore(totalTimeMs, dist); 
            }
        }

        function stopTaTimer() {
            taIsRunning = false;
            clearInterval(taTimerInterval);
        }

        // --- スコア算出・チート判定システム ---
        function calculateAvgWalkingSpeed() {
            const baseStride = userData.height * 0.45; // cm
            const footFactor = userData.foot / 26;
            const kmh = (baseStride / 100) * 1.2 * 3.6 * footFactor; 
            return kmh;
        }

        function calculateTaScore(timeMs, initialDistanceMeter) {
            const avgSpeedKmh = calculateAvgWalkingSpeed();
            const avgSpeedMs = avgSpeedKmh / 3.6; 
            
            const idealTimeSec = initialDistanceMeter / avgSpeedMs;
            const actualTimeSec = timeMs / 1000;
            
            const ratioPercent = (actualTimeSec / idealTimeSec) * 100;
            
            let score = 0;
            if (ratioPercent < 90) {
                score = 100;
            } else if (ratioPercent >= 250) {
                score = 0;
            } else {
                score = Math.round(100 - ((ratioPercent - 90) * (100 / (250 - 90))));
            }

            const pastBest = Number(localStorage.getItem("ta_best_score")) || 0;
            let isNewRecord = false;
            if (score > pastBest) {
                localStorage.setItem("ta_best_score", score);
                isNewRecord = true;
            }

            alert(`🏁 【挑戦完了】\n\nかかった時間: ${document.getElementById("ta-timer").innerText}\n理想時間に対する比率: ${Math.round(ratioPercent)}%\n算出スコア: ${score} 点\n${isNewRecord ? '🎉 最高記録更新！' : `(過去最高: ${pastBest}点)`}`);
            resetTaUi();
            updateMenuDisplay();
        }

        function handleCheatingDetected() {
            stopTaTimer();
            document.getElementById("ta-speed-alert").style.display = "block";
            alert("⚠️ 【速度超過を検知】\n歩行速度を大幅に超える移動速度が検出されました。タイムアタックを強制終了します。");
            resetTaUi();
        }

        // --- ポップアップ数値変更ロジック ---
        let currentEditKey = "";
        function openEditPopup(key) {
            currentEditKey = key;
            const overlay = document.getElementById("edit-overlay");
            const input = document.getElementById("popup-input");
            overlay.style.display = "flex";
            
            if(key === 'name') input.type = "text";
            else input.type = "number";
            
            input.value = userData[key] || "";
            toggleSidebar();
        }
        function closeEditPopup(save) {
            if (save) {
                const val = document.getElementById("popup-input").value;
                if(currentEditKey === 'name') {
                    userData.name = val;
                    localStorage.setItem("user_name", val);
                } else {
                    userData[currentEditKey] = Number(val);
                    localStorage.setItem(`user_${currentEditKey}`, val);
                }
                updateMenuDisplay();
            }
            document.getElementById("edit-overlay").style.display = "none";
        }

        function triggerReset() {
            if (confirm("本当にこれまでの参拝履歴とスコアをリセットしますか？")) {
                if (confirm("【最終確認】この操作は取り消せません。本当に初期状態に戻しますか？")) {
                    localStorage.clear();
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
